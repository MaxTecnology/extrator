services:
  carimbo-service:
    build: .
    container_name: carimbo-service
    ports:
      - "8001:8000"
    environment:
      APP_NAME: carimbo-service
      VERSION: 1.0.0
      DPI_RENDER: 300
      MIN_CONTOUR_AREA: 4000
      PADDING_PX: 20
      MAX_FILE_SIZE_MB: 20
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_DETECTION_MODEL: ${GEMINI_DETECTION_MODEL:-gemini-2.5-flash}
      GEMINI_EXTRACTION_MODEL: ${GEMINI_EXTRACTION_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-30}
      GEMINI_DETECTION_ENABLED: ${GEMINI_DETECTION_ENABLED:-false}
      GEMINI_MAX_CANDIDATES: ${GEMINI_MAX_CANDIDATES:-3}
      GEMINI_MAX_EVALUATIONS: ${GEMINI_MAX_EVALUATIONS:-6}
      GEMINI_DETECTION_RETRY_ATTEMPTS_CAP: ${GEMINI_DETECTION_RETRY_ATTEMPTS_CAP:-2}
      GEMINI_EXTRACTION_RETRY_ATTEMPTS_CAP: ${GEMINI_EXTRACTION_RETRY_ATTEMPTS_CAP:-1}
      GEMINI_RETRY_ATTEMPTS: ${GEMINI_RETRY_ATTEMPTS:-3}
      GEMINI_RETRY_BACKOFF_SECONDS: ${GEMINI_RETRY_BACKOFF_SECONDS:-1.2}
      GEMINI_RETRY_JITTER_SECONDS: ${GEMINI_RETRY_JITTER_SECONDS:-0.35}
      STAMP_BOTTOM_PRIORITY_Y_START: ${STAMP_BOTTOM_PRIORITY_Y_START:-0.60}
      STAMP_BOTTOM_PRIORITY_X_END: ${STAMP_BOTTOM_PRIORITY_X_END:-0.80}
      IMAGE_ARTIFACTS_DIR: ${IMAGE_ARTIFACTS_DIR:-/tmp/carimbo-artifacts}
      IMAGE_ARTIFACTS_URL_PREFIX: ${IMAGE_ARTIFACTS_URL_PREFIX:-/artifacts}
      SOC_ENABLED: ${SOC_ENABLED:-false}
      SOC_BASE_URL: ${SOC_BASE_URL:-https://ws1.soc.com.br/WebSoc/exportadados}
      SOC_EMPRESA: ${SOC_EMPRESA:-}
      SOC_CODIGO: ${SOC_CODIGO:-}
      SOC_CHAVE: ${SOC_CHAVE:-}
      SOC_TIPO_SAIDA: ${SOC_TIPO_SAIDA:-json}
      SOC_TIMEOUT_SECONDS: ${SOC_TIMEOUT_SECONDS:-15}
      SOC_NAME_SIMILARITY_THRESHOLD: ${SOC_NAME_SIMILARITY_THRESHOLD:-0.78}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
